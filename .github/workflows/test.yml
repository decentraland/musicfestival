name: Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install
        run: npm ci

      - name: Test
        run: npm run test:coverage
        if: ${{ always() }}
