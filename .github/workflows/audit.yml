name: Audit

on: [push, pull_request]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"

      - name: Upgrade npm
        run: npm i -g npm

      - name: Install
        run: npm ci

      - name: Audit signatures
        run: npm audit signatures
